<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Drop Shadow -->
  <polygon points="50,70 80,80 50,90 20,80" fill="#000000" opacity="0.35" />

  <!-- Thick Outer Border (using a duplicate polygon with thick stroke) -->
  <polygon points="50,15 82,33.5 82,66.5 50,85 18,66.5 18,33.5" fill="none" stroke="#111318" stroke-width="8" stroke-linejoin="round" />

  <!-- Faces -->
  <!-- Top Face (Amber Portal Brand) -->
  <polygon points="50,15 82,33.5 50,50 18,33.5" fill="#FBBF24" />
  
  <!-- Left Face (Green i.t.e.ms) -->
  <polygon points="18,33.5 50,50 50,85 18,66.5" fill="#10B981" />
  
  <!-- Right Face (Blue ModelEngine Format) -->
  <polygon points="50,50 82,33.5 82,66.5 50,85" fill="#3B82F6" />

  <!-- Inner Seam Lines -->
  <path d="M 50,50 L 50,85 M 50,50 L 18,33.5 M 50,50 L 82,33.5" stroke="#111318" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Grid Mesh Accents (low opacity editor guidelines) -->
  <!-- Top grid -->
  <line x1="34" y1="41.75" x2="66" y2="24.25" stroke="#ffffff" stroke-width="2" opacity="0.25" />
  <line x1="34" y1="24.25" x2="66" y2="41.75" stroke="#ffffff" stroke-width="2" opacity="0.25" />
  
  <!-- Left grid -->
  <line x1="18" y1="50" x2="50" y2="67.5" stroke="#ffffff" stroke-width="2" opacity="0.2" />
  <line x1="34" y1="41.75" x2="34" y2="75.75" stroke="#ffffff" stroke-width="2" opacity="0.2" />

  <!-- Right grid -->
  <line x1="50" y1="67.5" x2="82" y2="50" stroke="#ffffff" stroke-width="2" opacity="0.2" />
  <line x1="66" y1="41.75" x2="66" y2="75.75" stroke="#ffffff" stroke-width="2" opacity="0.2" />

  <!-- High-fidelity gloss reflections on the top rim -->
  <path d="M 18,33.5 L 50,15 L 82,33.5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.45" />
  
  <!-- Stylized central white editor pivot point -->
  <circle cx="50" cy="50" r="3" fill="#ffffff" opacity="0.8" />
</svg>